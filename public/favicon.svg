<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Brand Gradient (approximate OKLCH colors converted to hex for safe SVG rendering) -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" /> <!-- ~neon-blue -->
      <stop offset="50%" stop-color="#00e5ff" /> <!-- ~neon-cyan -->
      <stop offset="100%" stop-color="#b000ff" /> <!-- ~neon-purple -->
    </linearGradient>
  </defs>

  <!-- Rounded Background Box -->
  <rect width="64" height="64" rx="16" fill="url(#brandGradient)" />

  <!-- Scissors Icon (Lucide-style), scaled and centered -->
  <g transform="translate(14, 14) scale(1.5)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="6" r="3" />
    <circle cx="6" cy="18" r="3" />
    <path d="M20 4 8.12 15.88" />
    <path d="M14.47 14.48 20 20" />
    <path d="M8.12 8.12 12 12" />
  </g>
</svg>
